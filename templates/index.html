<!DOCTYPE html>
<html>
<head>
    <title>ClientFlow AI</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f8f7f4, #f1efe9);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 420px;
            height: 650px;
            background: #ffffff;
            border-radius: 18px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.1);
            border: 1px solid #eee;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: 0.3s ease;
        }

        .chat-container:hover {
            transform: translateY(-4px);
        }

        .header {
            padding: 16px;
            text-align: center;
            border-bottom: 1px solid #eee;
            background: linear-gradient(to right, #1f2937, #374151);
            color: white;
        }

        .header-title {
            font-size: 16px;
            font-weight: 600;
        }

        .header-sub {
            font-size: 12px;
            opacity: 0.8;
        }

        .chatbox {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
        }

        .demo-label {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 10px;
        }

        /* Message layout */
        .message-row {
            display: flex;
            align-items: flex-end;
            margin: 10px 0;
        }

        .message-row.user {
            justify-content: flex-end;
        }

        .message-row.bot {
            justify-content: flex-start;
        }

        .avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            margin: 0 8px;
        }

        .msg {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 14px;
            line-height: 1.5;
            animation: fadeIn 0.2s ease-in;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(5px);}
            to {opacity: 1; transform: translateY(0);}
        }

        .user .msg {
            background: #1f2937;
            color: white;
        }

        .bot .msg {
            background: #f3f4f6;
            color: #111;
        }

        .quick-actions {
            display: flex;
            gap: 8px;
            padding: 10px 14px;
            flex-wrap: wrap;
            border-top: 1px solid #eee;
        }

        .pill {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            background: #f3f4f6;
            transition: 0.2s;
        }

        .pill:hover {
            background: #1f2937;
            color: white;
        }

        .input-area {
            display: flex;
            padding: 12px;
            border-top: 1px solid #eee;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #ddd;
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            border-color: #1f2937;
        }

        button {
            margin-left: 8px;
            padding: 12px 16px;
            border: none;
            background: #1f2937;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            background: #111827;
        }

        .typing {
            font-size: 12px;
            color: #6b7280;
            margin-top: 5px;
        }

        .logo-container {
        display: flex;
        align-items: center;
        gap: 10px;
        justify-content: center;
    }

        .logo {
        width: 32px;
        height: 32px;
        object-fit: contain;
        border-radius: 8px;
    }
    </style>
</head>

<body>

<div class="chat-container">

    <div class="header">
    <div class="logo-container">
        <img src="static/icon_only-removebg-preview.png" class="logo">
        <div>
            <div class="header-title">ClientFlow AI</div>
            <div class="header-sub">GlowUp Salon • Smart Booking Assistant</div>
        </div>
    </div>
    </div>

    <div id="chatbox" class="chatbox">
        <div class="demo-label">Live AI Demo</div>

        <div class="message-row bot">
            <img class="avatar" src="https://cdn-icons-png.flaticon.com/512/4712/4712027.png">
            <div class="msg">Hello 👋 How can I help you today?</div>
        </div>
    </div>

    <div class="quick-actions">
        <div class="pill" onclick="quickMsg('Book appointment')">Book</div>
        <div class="pill" onclick="quickMsg('Show services')">Services</div>
        <div class="pill" onclick="quickMsg('Prices')">Prices</div>
    </div>

    <div class="input-area">
        <input id="message" placeholder="Ask about services or booking..." />
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>
async function sendMessage() {
    const input = document.getElementById("message");
    const chatbox = document.getElementById("chatbox");

    const text = input.value;
    if (!text) return;

    chatbox.innerHTML += `
    <div class="message-row user">
        <div class="msg">${text}</div>
        <img class="avatar" src="https://i.pravatar.cc/40?img=3">
    </div>`;

    input.value = "";

    chatbox.innerHTML += `<div id="typing" class="typing">Typing...</div>`;
    chatbox.scrollTop = chatbox.scrollHeight;

    const res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: text})
    });

    const data = await res.json();

    document.getElementById("typing").remove();

    chatbox.innerHTML += `
    <div class="message-row bot">
        <img class="avatar" src="https://cdn-icons-png.flaticon.com/512/4712/4712027.png">
        <div class="msg">${data.reply}</div>
    </div>`;

    chatbox.scrollTop = chatbox.scrollHeight;
}

function quickMsg(text) {
    document.getElementById("message").value = text;
    sendMessage();
}
</script>

</body>
</html>
